name: Publish

# Publishes both packages to npm when a version tag (e.g. v0.1.1) is pushed.
# Release flow: bump the packages' version, commit, then:
#   git tag v0.1.1 && git push --tags
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # required for npm provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      # Gate the release on the same checks as CI, then build from clean.
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      # Core first — the React package depends on it. --provenance stamps the
      # npm page with a verifiable "built from this commit" attestation.
      - run: npm publish -w packages/core --provenance --access public
      - run: npm publish -w packages/react --provenance --access public
