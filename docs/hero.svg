<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" role="img" aria-label="clarity — mind-mapping, reimagined for the web" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#151C30"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366F1"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="900" height="300" rx="24" fill="url(#bg)"/>

  <!-- wordmark -->
  <circle cx="64" cy="80" r="9" fill="url(#brand)"/>
  <text x="86" y="94" font-size="46" font-weight="800" fill="#F8FAFC" letter-spacing="-0.5">clarity</text>
  <text x="58" y="140" font-size="19" fill="#94A3B8">Mind-mapping, reimagined for the web.</text>
  <text x="58" y="170" font-size="14" fill="#64748B">Keyboard-first · zero-jank animated layout · headless core</text>

  <!-- kbd chips -->
  <g font-size="12.5" fill="#CBD5E1">
    <rect x="58" y="196" width="128" height="30" rx="8" fill="#1E293B" stroke="#334155"/>
    <text x="72" y="215">Tab → child</text>
    <rect x="196" y="196" width="140" height="30" rx="8" fill="#1E293B" stroke="#334155"/>
    <text x="210" y="215">Enter → sibling</text>
  </g>

  <!-- mind-map motif -->
  <g fill="none" stroke="url(#brand)" stroke-width="2.5" opacity="0.7">
    <path d="M648 150 C 706 150, 700 84, 748 84"/>
    <path d="M648 150 C 706 150, 716 150, 762 150"/>
    <path d="M648 150 C 706 150, 700 216, 748 216"/>
  </g>
  <rect x="562" y="128" width="86" height="44" rx="13" fill="url(#brand)"/>
  <text x="605" y="156" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">idea</text>
  <g font-size="14" fill="#E2E8F0">
    <rect x="748" y="66" width="86" height="36" rx="10" fill="#1E293B" stroke="#3B4A63"/>
    <text x="791" y="89" text-anchor="middle">plan</text>
    <rect x="762" y="132" width="86" height="36" rx="10" fill="#1E293B" stroke="#3B4A63"/>
    <text x="805" y="155" text-anchor="middle">build</text>
    <rect x="748" y="198" width="86" height="36" rx="10" fill="#1E293B" stroke="#3B4A63"/>
    <text x="791" y="221" text-anchor="middle">ship</text>
  </g>
</svg>
